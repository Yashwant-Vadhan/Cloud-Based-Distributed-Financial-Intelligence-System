<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AI-powered Smart Financial Intelligence System — automated budgeting, expense tracking, and predictive analytics." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Smart Financial Intelligence System</title>

    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  ANTI-FLICKER THEME INIT — runs before React mounts         ║
      ║  Reads saved theme from localStorage and applies the class   ║
      ║  to <html> synchronously so the first paint is correct.      ║
      ╚══════════════════════════════════════════════════════════════╝
    -->
    <script>
      (function () {
        var validThemes = ['light', 'dark', 'midnight', 'forest', 'cyberpunk'];
        var saved = '';
        try { saved = localStorage.getItem('app_theme') || 'light'; } catch (e) { saved = 'light'; }
        if (validThemes.indexOf(saved) === -1) saved = 'light';

        /* Apply theme class to <html> immediately */
        var html = document.documentElement;
        validThemes.forEach(function(t) { html.classList.remove('theme-' + t); });
        html.classList.add('theme-' + saved);

        /* Pre-set body background to prevent white flash on dark themes */
        var bgMap = {
          light:     '#f1f5f9',
          dark:      '#0f172a',
          midnight:  '#0b132b',
          forest:    '#0f2212',
          cyberpunk: '#120136'
        };
        document.documentElement.style.backgroundColor = bgMap[saved] || '#f1f5f9';
        document.documentElement.style.colorScheme = (saved === 'light') ? 'light' : 'dark';
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>

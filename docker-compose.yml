version: "3.8"

services:
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./auth-service/.env

  expense-service:
    build: ./expense-service
    ports:
      - "5002:5002"
    env_file:
      - ./expense-service/.env
    depends_on:
      - auth-service
      - ml-service
 
  ml-service:
    build: ./ml-service
    ports:
      - "5003:5003"
    env_file:
      - ./ml-service/.env

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_AUTH_URL=http://localhost:5001
        - REACT_APP_EXPENSE_URL=http://localhost:5002
        - REACT_APP_ML_URL=http://localhost:5003
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - expense-service
      - ml-service